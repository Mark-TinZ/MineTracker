

services:
  postgres:
    image: postgres:15-alpine
    container_name: minetracker_db
    restart: always
    environment:
      POSTGRES_USER: minetracker_user
      POSTGRES_PASSWORD: minetracker_password
      POSTGRES_DB: minetracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minetracker_user -d minetracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: minetracker_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: minetracker_bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: python -m mc_ping_bot

volumes:
  postgres_data:
  redis_data:
